# --------------------------------------
# Butterfly Theme Configuration
# 文档: https://butterfly.js.org/
# --------------------------------------

# --------------------------------------
# 导航设置
# --------------------------------------
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-user

# --------------------------------------
# 代码块
# --------------------------------------
code_blocks:
  theme: pale night
  macStyle: false
  height_limit: 520
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# --------------------------------------
# 社交链接
# --------------------------------------
social:
  fab fa-github: https://github.com/lucan6290 || GitHub || '#24292e'
  fab fa-git-alt: https://gitee.com/lucan6290 || Gitee || '#c71d23'
  fas fa-blog: https://blog.csdn.net/2301_80165396 || CSDN || '#fc5531'
  fas fa-envelope: mailto:lucan6290@gmail.com || 邮箱 || '#4a7dbe'

# --------------------------------------
# 图片设置
# --------------------------------------
favicon: /img/favicon.svg

avatar:
  img: /img/avatar.svg
  effect: true

# 首页顶部大图（可选，留空则为纯色背景）
index_img: /img/default-cover.svg
archive_img: /img/default-cover.svg
tag_img: /img/default-cover.svg
category_img: /img/default-cover.svg

# 默认背景图片（用于所有未单独设置背景的页面）
default_top_img: /img/default-cover.svg

# 文章封面
cover:
  index_enable: false
  aside_enable: true
  archives_enable: true
  default_cover: /img/default-cover.svg

# 404 页面
error_404:
  enable: true
  subtitle: '页面未找到...不如回去看看其他文章？'
  background: /img/default-cover.svg

# --------------------------------------
# 文章元信息
# --------------------------------------
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------
index_site_info_top:
index_top_img_height:

subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 箓藏千思，川流不息
    - 于技术之川，拾字成箓
    - 记录每一次探索与成长

index_layout: 4

index_post_content:
  method: 2
  length: 300

# --------------------------------------
# 文章页设置
# --------------------------------------
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/lucan6290
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

post_edit:
  enable: true
  url: https://github.com/lucan6290/lucan6290.github.io/tree/main/source/

noticeOutdate:
  enable: true
  style: flat
  limit_day: 180
  position: top
  message_prev: 距今已有
  message_next: 天未更新，内容可能已过时。

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: true
  custom_text: 箓川码笺 · 箓藏千思，川流不息

# --------------------------------------
# 侧边栏
# --------------------------------------
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 于技术之川，拾字成箓
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/lucan6290
  card_announcement:
    enable: true
    content: 箓藏千思，川流不息。记录学习、踩坑、成长的技术博客。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月
    order: -1
    limit: 12
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime_date: true
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1

# --------------------------------------
# 右下角按钮
# --------------------------------------
rightside_bottom:

translate:
  enable: false

readmode: true

darkmode:
  enable: true
  button: true
  autoChangeMode: 1

rightside_scroll_percent: true

# --------------------------------------
# 字数统计
# --------------------------------------
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# 不蒜子统计
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# 搜索 - 本地搜索
# --------------------------------------
search:
  use: local_search
  placeholder: 搜索文章...

  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: false
      hitsPerPage: 8

# --------------------------------------
# 分享
# --------------------------------------
share:
  use: sharejs
  sharejs:
    sites: qq,wechat,weibo

# --------------------------------------
# 评论系统 - Giscus
# 设置步骤: https://giscus.app/zh-CN
# --------------------------------------
comments:
  use: giscus
  text: true
  lazyload: true
  count: true
  card_post_count: true
  giscus:
    repo: lucan6290/lucan6290.github.io
    repo_id: ''
    category_id: ''
    category_name: General
    mapping: pathname
    reactions_enabled: 1
    emit_metadata: 0
    input_position: bottom
    theme: preferred_color_scheme
    lang: zh-CN

# --------------------------------------
# 图片灯箱
# --------------------------------------
lightbox: fancybox

# --------------------------------------
# Mermaid 图表支持
# --------------------------------------
mermaid:
  enable: true
  code_write: false
  theme:
    light: default
    dark: dark
  open_in_new_tab: true
  zoom_pan: true

# --------------------------------------
# 数学公式
# --------------------------------------
math:
  use: katex
  per_page: true

# --------------------------------------
# 通知提示
# --------------------------------------
note:
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0

# --------------------------------------
# 美化
# --------------------------------------
rounded_corners_ui: true

enter_transitions: true

beautify:
  enable: true
  field: post
  title_prefix_icon:
  title_prefix_icon_color:

# --------------------------------------
# 统一主题配色 - 苔原墨绿
# --------------------------------------
theme_color:
  enable: true
  main: "#3a7a5a"
  paginator: "#3a7a5a"
  text_selection: "#3a7a5a"
  link_color: "#b86b29"
  hr_color: "#3a7a5a"
  code_foreground: "#a85a2a"
  code_background: "rgba(58,122,90,0.08)"
  toc_color: "#3a7a5a"
  meta_color: "#6c757d"
  button_hover: "#4a9a72"
  scrollbar_color: "#3a7a5a"
  blockquote_padding_color: "#4a9a72"
  blockquote_background_color: "#3a7a5a"

# 打字特效
activate_power_mode:
  enable: false

# 点击烟花
fireworks:
  enable: false

# 鼠标特效
click_heart:
  enable: false

# --------------------------------------
# Lazyload 图片懒加载
# --------------------------------------
lazyload:
  enable: true
  native: true
  field: site
  placeholder:
  blur: false

# --------------------------------------
# Pjax
# --------------------------------------
pjax:
  enable: false

# --------------------------------------
# 其他
# --------------------------------------
instantpage: false

css_prefix: true

# Open Graph
Open_Graph_meta:
  enable: true
  option:

structured_data:
  enable: true

# 文章过期提醒

# --------------------------------------
# 自定义注入
# --------------------------------------
inject:
  head:
    - <meta name="google-site-verification" content="_Hh4_BMyNi3E6FYQomtwtWddvvYS1U4VEgLOpIDMMGU" />
  bottom:
    - <link rel="stylesheet" href="/css/custom.css">
    - |
      <script>
      // 为纯图标按钮添加 aria-label，提升可访问性
      document.addEventListener('DOMContentLoaded', function() {
        const iconButtons = [
          { id: 'readmode', label: '阅读模式' },
          { id: 'translateLink', label: '翻译' },
          { id: 'darkmode', label: '切换暗色模式' },
          { id: 'hide-aside-btn', label: '隐藏侧边栏' },
          { id: 'mobile-toc-button', label: '目录' },
          { id: 'chat-btn', label: '聊天' },
          { id: 'rightside-config', label: '设置' },
          { id: 'go-up', label: '返回顶部' },
          { id: 'to_comment', label: '跳转到评论' }
        ];

        iconButtons.forEach(function(item) {
          const el = document.getElementById(item.id);
          if (el && !el.hasAttribute('aria-label')) {
            el.setAttribute('aria-label', item.label);
          }
        });
      });
      </script>
