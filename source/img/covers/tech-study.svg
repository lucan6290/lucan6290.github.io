<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#63b3ed;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4299e1"/>
      <stop offset="100%" style="stop-color:#63b3ed;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g fill="#4299e1" font-family="'Fira Code',Consolas,monospace" font-size="11" opacity="0.08">
    <text x="50" y="35">function learn() <animate attributeName="x" values="50;45;55;50" dur="12s" repeatCount="indefinite"/></text>
    <text x="200" y="55">const knowledge <animate attributeName="x" values="200;205;195;200" dur="14s" repeatCount="indefinite"/></text>
    <text x="380" y="38">import Tutorial <animate attributeName="x" values="380;375;385;380" dur="11s" repeatCount="indefinite"/></text>
    <text x="550" y="48">class Study <animate attributeName="x" values="550;555;545;550" dur="13s" repeatCount="indefinite"/></text>
    <text x="80" y="90">async read() <animate attributeName="x" values="80;75;85;80" dur="15s" repeatCount="indefinite"/></text>
    <text x="280" y="105">export skill <animate attributeName="x" values="280;285;275;280" dur="12s" repeatCount="indefinite"/></text>
    <text x="480" y="85">interface Tech <animate attributeName="x" values="480;475;485;480" dur="14s" repeatCount="indefinite"/></text>
    <text x="650" y="95">type Code <animate attributeName="x" values="650;655;645;650" dur="11s" repeatCount="indefinite"/></text>
  </g>
  <g stroke="#4299e1" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="75" x2="800" y2="75"><animate attributeName="opacity" values="0.04;0.1;0.04" dur="6s" repeatCount="indefinite"/></line>
    <line x1="0" y1="150" x2="800" y2="150"><animate attributeName="opacity" values="0.04;0.1;0.04" dur="6s" begin="1.5s" repeatCount="indefinite"/></line>
    <line x1="0" y1="225" x2="800" y2="225"><animate attributeName="opacity" values="0.04;0.1;0.04" dur="6s" begin="3s" repeatCount="indefinite"/></line>
    <line x1="0" y1="300" x2="800" y2="300"><animate attributeName="opacity" values="0.04;0.1;0.04" dur="6s" begin="4.5s" repeatCount="indefinite"/></line>
    <line x1="133" y1="0" x2="133" y2="450"><animate attributeName="opacity" values="0.04;0.08;0.04" dur="7s" repeatCount="indefinite"/></line>
    <line x1="266" y1="0" x2="266" y2="450"><animate attributeName="opacity" values="0.04;0.08;0.04" dur="7s" begin="2s" repeatCount="indefinite"/></line>
    <line x1="400" y1="0" x2="400" y2="450"><animate attributeName="opacity" values="0.04;0.08;0.04" dur="7s" begin="3.5s" repeatCount="indefinite"/></line>
    <line x1="533" y1="0" x2="533" y2="450"><animate attributeName="opacity" values="0.04;0.08;0.04" dur="7s" begin="1s" repeatCount="indefinite"/></line>
    <line x1="666" y1="0" x2="666" y2="450"><animate attributeName="opacity" values="0.04;0.08;0.04" dur="7s" begin="4s" repeatCount="indefinite"/></line>
  </g>
  <text x="400" y="310" text-anchor="middle" font-family="serif" font-size="280" font-weight="700" fill="#4299e1" filter="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.08;0.15" dur="5s" repeatCount="indefinite"/>
    技
  </text>
  <text x="400" y="220" text-anchor="middle" font-family="serif" font-size="52" font-weight="700" fill="#63b3ed" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
    技术研习
  </text>
  <text x="400" y="260" text-anchor="middle" font-family="'Fira Code',Consolas,monospace" font-size="14" fill="#4299e1" opacity="0.7">// 深入技术，探索原理</text>
  <rect x="620" y="248" width="8" height="16" fill="#4299e1" rx="1">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/>
  </rect>
  <path d="M-20 340 Q100 310 200 335 T400 315 T600 340 T820 320" fill="none" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)">
    <animate attributeName="d" values="M-20 340 Q100 310 200 335 T400 315 T600 340 T820 320;M-20 320 Q100 350 200 325 T400 345 T600 320 T820 340;M-20 340 Q100 310 200 335 T400 315 T600 340 T820 320" dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M-20 360 Q120 335 230 355 T450 340 T650 360 T820 345" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6">
    <animate attributeName="d" values="M-20 360 Q120 335 230 355 T450 340 T650 360 T820 345;M-20 345 Q120 370 230 350 T450 365 T650 345 T820 360;M-20 360 Q120 335 230 355 T450 340 T650 360 T820 345" dur="6s" repeatCount="indefinite"/>
  </path>
  <text x="20" y="435" font-family="'Fira Code',Consolas,monospace" font-size="10" fill="#4299e1" opacity="0.2">Tech Study</text>
</svg>