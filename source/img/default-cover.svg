<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="40%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="river" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00bbf9;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00f5d4"/>
      <stop offset="80%" style="stop-color:#00bbf9"/>
      <stop offset="100%" style="stop-color:#00f5d4;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Code rain with random drift movement -->
  <g fill="#00f5d4" font-family="'Fira Code',Consolas,monospace" font-size="11" opacity="0.07">
    <text x="50" y="30">fn main()
      <animate attributeName="x" values="50;42;55;48;50" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="y" values="30;22;35;28;30" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="170" y="50">const val
      <animate attributeName="x" values="170;178;165;175;170" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="y" values="50;42;55;48;50" dur="11s" repeatCount="indefinite"/>
    </text>
    <text x="290" y="28">import sys
      <animate attributeName="x" values="290;282;295;288;290" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="y" values="28;20;33;25;28" dur="16s" repeatCount="indefinite"/>
    </text>
    <text x="430" y="42">async def
      <animate attributeName="x" values="430;438;425;435;430" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="y" values="42;34;48;40;42" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="560" y="55">SELECT *
      <animate attributeName="x" values="560;552;565;558;560" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="y" values="55;47;60;52;55" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="690" y="32">docker run
      <animate attributeName="x" values="690;698;685;692;690" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="y" values="32;24;38;30;32" dur="13s" repeatCount="indefinite"/>
    </text>
    <text x="30" y="85">git push
      <animate attributeName="x" values="30;22;35;28;30" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="y" values="85;77;92;82;85" dur="11s" repeatCount="indefinite"/>
    </text>
    <text x="200" y="100">npm run build
      <animate attributeName="x" values="200;208;195;205;200" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="y" values="100;92;108;96;100" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="360" y="78">kubectl apply
      <animate attributeName="x" values="360;352;368;358;360" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="y" values="78;70;85;75;78" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="520" y="92">pip install
      <animate attributeName="x" values="520;512;528;518;520" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="y" values="92;84;100;88;92" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="670" y="82">cargo build
      <animate attributeName="x" values="670;678;665;675;670" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="y" values="82;74;90;80;82" dur="13s" repeatCount="indefinite"/>
    </text>
    <text x="60" y="135">console.log
      <animate attributeName="x" values="60;52;68;58;60" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="y" values="135;127;142;130;135" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="230" y="148">HashMap::new
      <animate attributeName="x" values="230;222;238;225;230" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="y" values="148;140;155;145;148" dur="11s" repeatCount="indefinite"/>
    </text>
    <text x="410" y="130">go func()
      <animate attributeName="x" values="410;418;405;415;410" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="y" values="130;122;138;128;130" dur="14s" repeatCount="indefinite"/>
    </text>
    <text x="590" y="142">rsync -av
      <animate attributeName="x" values="590;582;598;588;590" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="y" values="142;134;150;138;142" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="40" y="195">pytest -v
      <animate attributeName="x" values="40;32;48;38;40" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="y" values="195;187;202;190;195" dur="13s" repeatCount="indefinite"/>
    </text>
    <text x="210" y="210">make install
      <animate attributeName="x" values="210;218;205;215;210" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="y" values="210;202;218;206;210" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="380" y="198">go mod tidy
      <animate attributeName="x" values="380;372;388;378;380" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="y" values="198;190;205;194;198" dur="11s" repeatCount="indefinite"/>
    </text>
    <text x="550" y="205">vim ~/.config
      <animate attributeName="x" values="550;542;558;548;550" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="y" values="205;197;212;200;205" dur="14s" repeatCount="indefinite"/>
    </text>
  </g>
  <!-- Grid with subtle pulse -->
  <g stroke="#00f5d4" stroke-width="0.5">
    <line x1="0" y1="75" x2="800" y2="75" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.08;0.03" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="150" x2="800" y2="150" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.08;0.03" dur="6s" begin="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="225" x2="800" y2="225" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.08;0.03" dur="6s" begin="3s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="300" x2="800" y2="300" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.08;0.03" dur="6s" begin="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="375" x2="800" y2="375" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.08;0.03" dur="6s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="133" y1="0" x2="133" y2="450" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.06;0.03" dur="7s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="266" y1="0" x2="266" y2="450" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.06;0.03" dur="7s" begin="2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="0" x2="400" y2="450" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.06;0.03" dur="7s" begin="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="533" y1="0" x2="533" y2="450" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.06;0.03" dur="7s" begin="1s" repeatCount="indefinite"/>
    </line>
    <line x1="666" y1="0" x2="666" y2="450" opacity="0.03">
      <animate attributeName="opacity" values="0.03;0.06;0.03" dur="7s" begin="4s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Giant watermark 箓 - much bigger -->
  <text x="400" y="310" text-anchor="middle" font-family="serif" font-size="320" font-weight="700" fill="#00f5d4" filter="url(#glow-lg)" opacity="0.12">
    <animate attributeName="opacity" values="0.12;0.06;0.12" dur="5s" repeatCount="indefinite"/>
    箓
  </text>
  <!-- Title with breathing glow -->
  <text x="400" y="220" text-anchor="middle" font-family="serif" font-size="56" font-weight="700" fill="#00f5d4" filter="url(#glow-lg)">
    <animate attributeName="opacity" values="1;0.8;1" dur="3s" repeatCount="indefinite"/>
    箓川码笺
  </text>
  <!-- Subtitle with cursor blink -->
  <text x="400" y="260" text-anchor="middle" font-family="'Fira Code',Consolas,monospace" font-size="14" fill="#00bbf9" opacity="0.6">// 于技术之川，拾字成箓</text>
  <rect x="660" y="248" width="8" height="16" fill="#00bbf9" rx="1">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- River lines - big wave amplitude -->
  <path d="M-20 330 Q100 300 200 325 T400 305 T600 330 T820 310" fill="none" stroke="url(#river)" stroke-width="3" filter="url(#glow-md)">
    <animate attributeName="d" values="M-20 330 Q100 300 200 325 T400 305 T600 330 T820 310;M-20 310 Q100 340 200 315 T400 335 T600 310 T820 330;M-20 330 Q100 300 200 325 T400 305 T600 330 T820 310" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M-20 350 Q120 325 230 345 T450 330 T650 350 T820 335" fill="none" stroke="url(#river)" stroke-width="2" filter="url(#glow-md)">
    <animate attributeName="d" values="M-20 350 Q120 325 230 345 T450 330 T650 350 T820 335;M-20 335 Q120 360 230 340 T450 355 T650 335 T820 350;M-20 350 Q120 325 230 345 T450 330 T650 350 T820 335" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.55;0.3" dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M-20 368 Q140 350 250 365 T470 355 T670 368 T820 358" fill="none" stroke="url(#river)" stroke-width="1.5">
    <animate attributeName="d" values="M-20 368 Q140 350 250 365 T470 355 T670 368 T820 358;M-20 355 Q140 375 250 360 T470 372 T670 355 T820 368;M-20 368 Q140 350 250 365 T470 355 T670 368 T820 358" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="7s" repeatCount="indefinite"/>
  </path>
  <path d="M-20 382 Q160 370 270 380 T490 374 T680 382 T820 376" fill="none" stroke="url(#river)" stroke-width="1">
    <animate attributeName="d" values="M-20 382 Q160 370 270 380 T490 374 T680 382 T820 376;M-20 374 Q160 388 270 378 T490 384 T680 374 T820 382;M-20 382 Q160 370 270 380 T490 374 T680 382 T820 376" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="8s" repeatCount="indefinite"/>
  </path>
  <!-- Corner -->
  <text x="20" y="435" font-family="'Fira Code',Consolas,monospace" font-size="10" fill="#00f5d4" opacity="0.15">lucan6290.github.io</text>
</svg>
