name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: blog-content/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('blog-content/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: blog-content
        run: npm ci

      - name: Install admin-dev dependencies
        working-directory: admin-dev/frontend
        run: npm ci

      - name: Build admin dashboard
        working-directory: admin-dev/frontend
        run: npm run build

      - name: Generate static files
        working-directory: blog-content
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./blog-content/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
