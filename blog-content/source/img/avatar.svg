<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="river" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00bbf9;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00f5d4"/>
      <stop offset="70%" style="stop-color:#00bbf9"/>
      <stop offset="100%" style="stop-color:#00f5d4;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="200" height="200" fill="url(#bg)"/>
    <!-- Grid with twinkling -->
    <g stroke="#00f5d4" stroke-width="0.5">
      <line x1="0" y1="40" x2="200" y2="40" opacity="0.05">
        <animate attributeName="opacity" values="0.05;0.12;0.05" dur="4s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="80" x2="200" y2="80" opacity="0.05">
        <animate attributeName="opacity" values="0.05;0.12;0.05" dur="4s" begin="1s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="120" x2="200" y2="120" opacity="0.05">
        <animate attributeName="opacity" values="0.05;0.12;0.05" dur="4s" begin="2s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="160" x2="200" y2="160" opacity="0.05">
        <animate attributeName="opacity" values="0.05;0.12;0.05" dur="4s" begin="3s" repeatCount="indefinite"/>
      </line>
      <line x1="40" y1="0" x2="40" y2="200" opacity="0.05">
        <animate attributeName="opacity" values="0.05;0.1;0.05" dur="5s" begin="0.5s" repeatCount="indefinite"/>
      </line>
      <line x1="80" y1="0" x2="80" y2="200" opacity="0.05">
        <animate attributeName="opacity" values="0.05;0.1;0.05" dur="5s" begin="2.5s" repeatCount="indefinite"/>
      </line>
      <line x1="120" y1="0" x2="120" y2="200" opacity="0.05">
        <animate attributeName="opacity" values="0.05;0.1;0.05" dur="5s" begin="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="160" y1="0" x2="160" y2="200" opacity="0.05">
        <animate attributeName="opacity" values="0.05;0.1;0.05" dur="5s" begin="3.5s" repeatCount="indefinite"/>
      </line>
    </g>
    <!-- River lines with flowing animation -->
    <path d="M-10 140 Q40 125 70 145 T150 130 T210 140" fill="none" stroke="url(#river)" stroke-width="2" filter="url(#glow-sm)">
      <animate attributeName="d" values="M-10 140 Q40 125 70 145 T150 130 T210 140;M-10 130 Q40 155 70 135 T150 150 T210 130;M-10 140 Q40 125 70 145 T150 130 T210 140" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M-10 158 Q50 145 80 162 T160 148 T210 158" fill="none" stroke="url(#river)" stroke-width="1.5">
      <animate attributeName="d" values="M-10 158 Q50 145 80 162 T160 148 T210 158;M-10 148 Q50 170 80 150 T160 168 T210 148;M-10 158 Q50 145 80 162 T160 148 T210 158" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M-10 172 Q60 162 90 175 T170 165 T210 172" fill="none" stroke="url(#river)" stroke-width="1">
      <animate attributeName="d" values="M-10 172 Q60 162 90 175 T170 165 T210 172;M-10 165 Q60 180 90 168 T170 178 T210 165;M-10 172 Q60 162 90 175 T170 165 T210 172" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.35;0.15" dur="6s" repeatCount="indefinite"/>
    </path>
    <!-- Main character with breathing glow -->
    <text x="100" y="120" text-anchor="middle" font-family="serif" font-size="90" font-weight="700" fill="#00f5d4" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.75;1" dur="3s" repeatCount="indefinite"/>
      箓
    </text>
    <!-- Author name -->
    <text x="100" y="175" text-anchor="middle" font-family="'Fira Code',Consolas,monospace" font-size="16" fill="#00bbf9" opacity="0.7" letter-spacing="4">lucan</text>
  </g>
</svg>
