<h2>方案 A：「箓」字为核心</h2>

<div style="margin-top:2rem">

      </svg>
      <div style="color:#00f5d4;font-size:0.75rem;margin-top:0.5rem">风格一：简洁汉字</div>
    </div>
    <!-- Style 2: 圆形印章风格 -->
    <div style="text-align:center">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

      <div style="color:#e74c3c;font-size:0.75rem;margin-top:0.5rem">风格二：朱红印章</div>
    </div>
    <!-- Style 3: 几何线条风格 -->
    <div style="text-align:center">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="abg3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0a0e27"/>
            <stop offset="100%" style="stop-color:#1a1a2e"/>
          </linearGradient>
          <filter id="ag3">
            <feGaussianBlur stdDeviation="2" result="blur"/>

        <rect width="64" height="64" rx="14" fill="url(#abg3)"/>

        <rect x="20" y="18" width="24" height="2" rx="1" fill="#00f5d4" opacity="0.5"/>
        <rect x="16" y="24" width="32" height="2" rx="1" fill="#00f5d4" opacity="0.7" filter="url(#ag3)"/>
        <line x1="32" y1="27" x2="32" y2="42" stroke="#00bbf9" stroke-width="2" opacity="0.8"/>
        <line x1="24" y1="27" x2="24" y2="38" stroke="#00bbf9" stroke-width="1.5" opacity="0.5"/>
        <line x1="40" y1="27" x2="40" y2="38" stroke="#00bbf9" stroke-width="1.5" opacity="0.5"/>
        <rect x="16" y="42" width="32" height="2.5" rx="1" fill="#00f5d4" opacity="0.9" filter="url(#ag3)"/>

</div>

</div>
